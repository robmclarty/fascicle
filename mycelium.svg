    <path d="M 180 220 C 150 245, 110 268, 78 296"/>
    <path d="M 180 220 C 195 260, 178 308, 162 352"/>
    <path d="M 180 220 C 240 258, 252 308, 268 360"/>
    <path d="M 180 220 C 130 240, 90 248, 50 252"/>
    <path d="M 440 230 C 418 270, 398 314, 388 362"/>
    <path d="M 440 230 C 462 278, 484 322, 502 364"/>
    <path d="M 440 230 C 380 258, 332 280, 288 292"/>
    <path d="M 440 230 C 498 252, 548 282, 588 320"/>
    <path d="M 700 220 C 728 248, 768 270, 808 292"/>
    <path d="M 700 220 C 720 270, 730 312, 740 360"/>
    <path d="M 700 220 C 680 262, 660 312, 648 362"/>
    <path d="M 700 220 C 760 240, 810 248, 854 252"/>
  </g>

  <g class="myc-thin" stroke-width="0.65">
    <path d="M 78 296 C 88 322, 70 346, 50 366"/>
    <path d="M 78 296 C 110 312, 130 332, 142 362"/>
    <path d="M 162 352 C 180 362, 202 366, 224 370"/>
    <path d="M 268 360 C 290 352, 312 346, 334 360"/>
    <path d="M 388 362 C 412 366, 432 360, 452 366"/>
    <path d="M 502 364 C 522 354, 542 360, 562 366"/>
    <path d="M 588 320 C 608 340, 628 352, 648 366"/>
    <path d="M 740 360 C 760 352, 782 356, 802 366"/>
    <path d="M 808 292 C 832 312, 852 332, 870 354"/>
    <path d="M 288 292 C 264 312, 232 322, 210 342"/>
    <path d="M 288 292 C 308 314, 328 322, 354 332"/>
    <path d="M 200 280 C 232 286, 268 292, 298 296"/>
    <path d="M 460 280 C 492 286, 528 292, 558 296"/>
    <path d="M 350 326 C 380 330, 410 334, 440 338"/>
    <path d="M 600 312 C 630 318, 660 322, 688 326"/>
    <path d="M 130 322 C 162 326, 192 330, 222 336"/>
    <path d="M 720 290 C 750 296, 778 302, 800 306"/>
    <path d="M 110 250 C 142 256, 162 262, 178 268"/>
    <path d="M 770 250 C 738 256, 718 262, 702 268"/>
    <path d="M 380 250 C 410 256, 432 262, 446 268"/>
    <path d="M 500 252 C 472 258, 452 262, 442 268"/>
    <path d="M 240 332 C 270 338, 296 342, 320 346"/>
    <path d="M 560 332 C 590 338, 616 342, 640 346"/>
  </g>

