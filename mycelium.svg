  <g class="myc-thin" stroke-width="0.7">
    <path d="M 174 215 C 168 220, 162 224, 156 228"/>
    <path d="M 186 215 C 192 220, 198 224, 204 228"/>
    <path d="M 432 215 C 424 222, 416 228, 408 234"/>
    <path d="M 448 215 C 456 222, 464 228, 472 234"/>
    <path d="M 678 215 C 672 220, 666 224, 660 228"/>
    <path d="M 700 215 C 706 220, 714 224, 722 228"/>
    <path d="M 726 215 C 732 220, 740 224, 748 228"/>
  </g>

  <g class="mono">
    <text x="180" y="38" text-anchor="middle" class="label">model_call</text>
    <text x="180" y="52" text-anchor="middle" class="sublabel">an LLM call</text>

    <text x="440" y="38" text-anchor="middle" class="label">step</text>
    <text x="440" y="52" text-anchor="middle" class="sublabel">a plain function</text>

    <text x="700" y="38" text-anchor="middle" class="label">tool</text>
    <text x="700" y="52" text-anchor="middle" class="sublabel">a tool call</text>
  </g>

  <rect y="380" width="880" height="30" fill="#f3e9cc"/>
  <line x1="0" y1="380" x2="880" y2="380" stroke="#8a6536" stroke-width="0.5" opacity="0.6"/>

  <text x="440" y="400" text-anchor="middle" class="sans caption">
    a substrate for agents — every mushroom is a <tspan class="mono" font-weight="700">Step&lt;i, o&gt;</tspan>, every thread is a composition
  </text>
</svg>
