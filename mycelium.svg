    <circle cx="700" cy="220" r="2.8"/>
    <circle cx="78"  cy="296" r="1.7"/>
    <circle cx="162" cy="352" r="1.3"/>
    <circle cx="268" cy="360" r="1.3"/>
    <circle cx="388" cy="362" r="1.3"/>
    <circle cx="502" cy="364" r="1.3"/>
    <circle cx="588" cy="320" r="1.7"/>
    <circle cx="740" cy="360" r="1.3"/>
    <circle cx="808" cy="292" r="1.7"/>
    <circle cx="288" cy="292" r="1.5"/>
    <circle cx="350" cy="326" r="1.1"/>
    <circle cx="648" cy="366" r="1.1"/>
    <circle cx="50"  cy="252" r="1.2"/>
    <circle cx="854" cy="252" r="1.2"/>
  </g>

  <!-- Mushroom 1: model_call — tall ochre, morel/chanterelle silhouette -->
  <g transform="translate(180, 0)">
    <path d="M -7 215 Q -11 188, -8 158 L 8 158 Q 11 188, 7 215 Z"
          class="stem-fill stroke-dark" stroke-width="1.2"/>
    <path d="M -28 158
             Q -36 146, -30 126
             Q -26 100, -18 82
             Q -10 70, 0 68
             Q 10 70, 18 82
             Q 26 100, 30 126
             Q 36 146, 28 158
             Q 22 165, 12 162
             Q 6 168, 0 167
             Q -6 168, -12 162
             Q -22 165, -28 158 Z"
          fill="url(#cap-ochre)" stroke="#2c1d10" stroke-width="1.4"/>
    <path d="M -18 96 Q -8 80, 6 76" stroke="#f5cf95" stroke-width="1.4" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M -28 158 Q -14 162, 0 161 Q 14 162, 28 158" stroke="#4a1c0a" stroke-width="0.8" fill="none" opacity="0.55"/>
    <g class="gill">
      <line x1="-18" y1="160" x2="-18" y2="165"/>
      <line x1="-12" y1="162" x2="-12" y2="166"/>
      <line x1="-6"  y1="163" x2="-6"  y2="166"/>
      <line x1="0"   y1="163" x2="0"   y2="166"/>
      <line x1="6"   y1="163" x2="6"   y2="166"/>
      <line x1="12"  y1="162" x2="12"  y2="166"/>
      <line x1="18"  y1="160" x2="18"  y2="165"/>
    </g>
  </g>

