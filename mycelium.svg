<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 410" role="img" aria-labelledby="myc-title myc-desc">
  <title id="myc-title">fascicle — a substrate for agents</title>
  <desc id="myc-desc">Three mushrooms — model_call, step, and tool — fruit from a shared mycelium network in the soil. Each mushroom is a Step&lt;i, o&gt;; the threads weaving them together are compositions.</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf5e2"/>
      <stop offset="100%" stop-color="#f3e9cc"/>
    </linearGradient>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b89668"/>
      <stop offset="55%" stop-color="#8d6c40"/>
      <stop offset="100%" stop-color="#5e4424"/>
    </linearGradient>
    <linearGradient id="cap-ochre" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#daa05a"/>
      <stop offset="100%" stop-color="#9a5f1f"/>
    </linearGradient>
    <linearGradient id="cap-burgundy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a4492e"/>
      <stop offset="100%" stop-color="#6a2517"/>
    </linearGradient>
    <linearGradient id="cap-sage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9aac63"/>
      <stop offset="100%" stop-color="#566532"/>
    </linearGradient>
    <radialGradient id="hub-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbf4e0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fbf4e0" stop-opacity="0"/>
    </radialGradient>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .label    { font-size: 12px; font-weight: 700; fill: #2c1d10; letter-spacing: 0.02em; }
      .sublabel { font-size: 10px; fill: #6b4f2e; font-style: italic; }
      .caption  { font-size: 12.5px; fill: #2c1d10; }
      .stem-fill { fill: #f1e1be; }
      .stroke-dark { stroke: #2c1d10; }
      .gill { stroke: #6b4a28; stroke-width: 0.55; opacity: 0.7; stroke-linecap: round; }
      .myc-thick { stroke: #f7ebc8; fill: none; stroke-linecap: round; opacity: 0.95; }
      .myc-mid   { stroke: #f4e3b8; fill: none; stroke-linecap: round; opacity: 0.75; }
      .myc-thin  { stroke: #ecd9a6; fill: none; stroke-linecap: round; opacity: 0.55; }
      .myc-node  { fill: #fbf4e0; stroke: #5a3f22; stroke-width: 0.4; }
    </style>
  </defs>

  <rect width="880" height="220" fill="url(#sky)"/>
  <rect y="210" width="880" height="170" fill="url(#soil)"/>

  <path d="M0 213 Q 60 207, 130 212 T 260 214 T 400 209 T 540 213 T 680 207 T 800 212 L 880 211 L 880 215 L 0 215 Z"
        fill="#8a6536" opacity="0.45"/>

  <g fill="#3a2818" opacity="0.35">
    <circle cx="60"  cy="280" r="0.9"/>
    <circle cx="220" cy="320" r="1.1"/>
    <circle cx="380" cy="260" r="0.7"/>
    <circle cx="540" cy="340" r="1"/>
    <circle cx="660" cy="290" r="0.8"/>
    <circle cx="780" cy="310" r="1"/>
    <circle cx="100" cy="350" r="0.7"/>
    <circle cx="320" cy="300" r="0.8"/>
    <circle cx="600" cy="270" r="0.7"/>
    <circle cx="450" cy="345" r="0.9"/>
    <circle cx="170" cy="265" r="0.6"/>
    <circle cx="730" cy="345" r="0.7"/>
  </g>

