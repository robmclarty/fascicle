    <path d="M 180 222 C 240 240, 320 252, 380 248 S 420 240, 440 232"/>
    <path d="M 440 232 C 500 244, 560 256, 620 252 S 680 240, 700 222"/>
    <path d="M 180 224 C 250 268, 360 296, 440 244"/>
    <path d="M 700 224 C 630 268, 520 296, 440 244"/>
  </g>
