    <path d="M 180 226 C 250 248, 330 260, 440 240"/>
    <path d="M 700 226 C 630 248, 550 260, 440 240"/>
    <path d="M 180 228 C 260 280, 360 308, 440 252"/>
    <path d="M 700 228 C 620 280, 520 308, 440 252"/>
