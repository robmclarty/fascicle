  <g transform="translate(440, 0)">
    <path d="M -10 215 Q -13 184, -10 158 L 10 158 Q 13 184, 10 215 Z"
          class="stem-fill stroke-dark" stroke-width="1.3"/>
    <path d="M -13 178 Q -16 181, -11 183 L 11 183 Q 16 181, 13 178 Z"
          fill="#e8d4a8" stroke="#2c1d10" stroke-width="0.9"/>
    <path d="M -42 145 Q -50 108, -28 86 Q 0 70, 28 86 Q 50 108, 42 145 Q 38 159, 0 161 Q -38 159, -42 145 Z"
          fill="url(#cap-burgundy)" stroke="#2c1d10" stroke-width="1.4"/>
    <g fill="#fbf4e0" opacity="0.88">
      <ellipse cx="-22" cy="105" rx="3.6" ry="2.6"/>
      <ellipse cx="-5"  cy="91"  rx="3"   ry="2.1"/>
      <ellipse cx="14"  cy="100" rx="3.5" ry="2.5"/>
      <ellipse cx="28"  cy="115" rx="2.5" ry="1.8"/>
      <ellipse cx="-30" cy="125" rx="2.5" ry="1.8"/>
      <ellipse cx="6"   cy="120" rx="2.6" ry="1.9"/>
      <ellipse cx="22"  cy="132" rx="2.2" ry="1.6"/>
    </g>
    <path d="M -28 100 Q -10 80, 16 82" stroke="#d97a55" stroke-width="1.2" fill="none" opacity="0.45" stroke-linecap="round"/>
    <path d="M -42 145 Q 0 152, 42 145" stroke="#3a1208" stroke-width="0.8" fill="none" opacity="0.55"/>
    <g class="gill">
      <line x1="-32" y1="153" x2="-32" y2="159"/>
      <line x1="-22" y1="155" x2="-22" y2="160"/>
      <line x1="-12" y1="156" x2="-12" y2="160"/>
      <line x1="0"   y1="156" x2="0"   y2="160"/>
      <line x1="12"  y1="156" x2="12"  y2="160"/>
      <line x1="22"  y1="155" x2="22"  y2="160"/>
      <line x1="32"  y1="153" x2="32"  y2="159"/>
    </g>
  </g>

  <!-- Mushroom 3: tool — small sage cluster -->
  <g transform="translate(700, 0)">
    <g transform="translate(-22, 0)">
      <path d="M -5 215 Q -6 196, -4 178 L 4 178 Q 6 196, 5 215 Z"
            class="stem-fill stroke-dark" stroke-width="1"/>
      <path d="M -14 178 Q -17 154, -8 144 Q 0 139, 8 144 Q 17 154, 14 178 Q 12 184, 0 184 Q -12 184, -14 178 Z"
            fill="url(#cap-sage)" stroke="#2c1d10" stroke-width="1.1"/>
      <path d="M -10 154 Q -2 144, 6 146" stroke="#cad89a" stroke-width="0.9" fill="none" opacity="0.6" stroke-linecap="round"/>
      <g class="gill">
        <line x1="-8" y1="180" x2="-8" y2="184"/>
        <line x1="-3" y1="181" x2="-3" y2="184"/>
        <line x1="2"  y1="181" x2="2"  y2="184"/>
        <line x1="7"  y1="180" x2="7"  y2="184"/>
      </g>
    </g>
    <g transform="translate(2, 0)">
      <path d="M -7 215 Q -10 182, -5 152 L 5 152 Q 10 182, 7 215 Z"
            class="stem-fill stroke-dark" stroke-width="1.2"/>
      <path d="M -20 152 Q -25 118, -10 98 Q 0 90, 10 98 Q 25 118, 20 152 Q 16 160, 0 161 Q -16 160, -20 152 Z"
            fill="url(#cap-sage)" stroke="#2c1d10" stroke-width="1.3"/>
      <path d="M -14 108 Q -4 92, 8 96" stroke="#d4dfa4" stroke-width="1.1" fill="none" opacity="0.65" stroke-linecap="round"/>
      <path d="M -20 152 Q 0 158, 20 152" stroke="#2c3a14" stroke-width="0.7" fill="none" opacity="0.5"/>
      <g class="gill">
        <line x1="-12" y1="155" x2="-12" y2="160"/>
        <line x1="-6"  y1="156" x2="-6"  y2="160"/>
        <line x1="0"   y1="156" x2="0"   y2="160"/>
        <line x1="6"   y1="156" x2="6"   y2="160"/>
        <line x1="12"  y1="155" x2="12"  y2="160"/>
      </g>
    </g>
    <g transform="translate(26, 0)">
      <path d="M -5 215 Q -6 192, -4 174 L 4 174 Q 6 192, 5 215 Z"
