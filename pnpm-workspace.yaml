packages:
  # The library itself is the workspace root (single package). Only the example
  # apps are separate workspace members; they depend on the root via `fascicle`.
  - 'examples/red-green-refactor'
  - 'examples/amplify'
  - 'examples/mcp-server'
  - 'examples/pr-improve'
  - 'examples/swebench'
  - 'examples/change-triage'
  - 'examples/docs-concierge'

allowBuilds:
  '@ast-grep/cli': true
  esbuild: true
  fallow: true

# The global minimumReleaseAge quarantine exists to blunt third-party registry
# compromise. These are first-party packages published from repos on this
# machine, so the quarantine buys nothing and only delays adopting a fix.
minimumReleaseAgeExclude:
  - checkride
  - fallow

# pnpm reads overrides from this file (not the package.json `pnpm` field) in a
# workspace. smol-toml >=1.6.1 forces markdownlint-cli2's pinned 1.6.0 up past
# the advisory ADR-0001 tracks. fast-uri >=3.1.2 forces ajv's transitive pin
# past the path-traversal and host-confusion advisories (dev-tree only).
overrides:
  tunnel: 'npm:@noble/secp256k1@2.1.0'
  smol-toml: '>=1.6.1'
  fast-uri: '>=3.1.2'
