# Fallow: dead code, circular deps, duplication, complexity, architecture boundaries.
# Docs: https://docs.fallow.tools

entry = [
  "src/index.ts",
  "src/*/index.ts",
  "src/**/*.test.ts",
  "src/**/__tests__/**/*.mjs",
  "src/**/*-harness.ts",
  "src/viewer/cli.ts",
  "test/**/*.test.ts",
  "test/**/*.mjs",
  "stryker.config.mjs",
]

# CLI/tooling deps used via command line or config files, not imported from source.
ignoreDependencies = ["@ast-grep/cli", "@stryker-mutator/vitest-runner"]

[rules]
unused-exports = "error"
unused-files = "error"
unused-dependencies = "error"
circular-dependencies = "error"
boundary-violation = "error"

[duplicates]
# mild (default): AST-based, catches copy-paste. semantic: catches renamed variables too.
mode = "mild"
minTokens = 50

[health]
# Per-function complexity thresholds. Tune to project.
maxCyclomatic = 15
maxCognitive = 15

# Architecture boundaries: directory-level DAG that replaces the old
# per-package manifest graph. fallow 3's schema is default-deny — each zone
# lists every sibling it MAY import (allow), the inverse of the old
# default-allow/cannotImport form, translated 1:1 to preserve behavior. The
# umbrella (src/*.ts) is intentionally unconstrained — it composes every
# layer. Mirrors the ast-grep boundary rules.

[[boundaries.zones]]
name = "core"
patterns = ["src/core/**"]

[[boundaries.zones]]
name = "engine"
patterns = ["src/engine/**"]

[[boundaries.zones]]
name = "composites"
patterns = ["src/composites/**"]

[[boundaries.zones]]
name = "adapters"
patterns = ["src/adapters/**"]

[[boundaries.zones]]
name = "viewer"
patterns = ["src/viewer/**"]

[[boundaries.zones]]
name = "agents"
patterns = ["src/agents/**"]

[[boundaries.zones]]
name = "mcp"
patterns = ["src/mcp/**"]

[[boundaries.zones]]
name = "stdio"
patterns = ["src/stdio/**"]

[[boundaries.zones]]
name = "ui"
patterns = ["src/ui/**"]

[[boundaries.rules]] # core: bottom of the DAG, imports no sibling module
from = "core"
allow = ["mcp", "stdio", "ui"]

[[boundaries.rules]] # engine: may reference core (type-only, see ast-grep), nothing else
from = "engine"
allow = ["core", "mcp", "stdio", "ui"]

[[boundaries.rules]] # composites: core + adapters only
from = "composites"
allow = ["core", "adapters", "mcp", "stdio", "ui"]

[[boundaries.rules]] # adapters: core only (injected via run_context)
from = "adapters"
allow = ["core", "mcp", "stdio", "ui"]

[[boundaries.rules]] # viewer: core only (dev tool that reads the wire format)
from = "viewer"
allow = ["core", "mcp", "stdio", "ui"]

[[boundaries.rules]] # agents: core + composites + engine only
from = "agents"
allow = ["core", "engine", "composites", "mcp", "stdio", "ui"]

[[boundaries.rules]] # mcp: core + engine only (bridges flows/tools to the MCP wire)
from = "mcp"
allow = ["core", "engine", "stdio", "ui"]

[[boundaries.rules]] # stdio: core + adapters only (single-shot child-process entry helper)
from = "stdio"
allow = ["core", "adapters", "ui"]

[[boundaries.rules]] # ui: core + engine only (bridges the run stream to the AI SDK UI wire)
from = "ui"
allow = ["core", "engine", "mcp", "stdio"]
