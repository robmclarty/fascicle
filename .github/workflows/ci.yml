name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check suite
        run: pnpm check
      - name: Build
        run: pnpm build
      - name: Validate publish surface
        run: pnpm check:publish

  mutation:
    # Stryker is the slowest check; run it only on main so PRs stay fast.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore Stryker incremental baseline
        # The baseline is gitignored; CI carries it forward across runs so each
        # invocation mutates only what changed since the last green main.
        uses: actions/cache@v4
        with:
          path: stryker.incremental.json
          key: stryker-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            stryker-${{ github.ref_name }}-
            stryker-main-
      - name: Mutation testing
        run: pnpm check:mutation
