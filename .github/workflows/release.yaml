name: Release

# Publishing to npm is done MANUALLY (locally, gated by MFA) so no long-lived
# npm credential ever lives in CI. This workflow only turns a pushed `v*` tag
# into a GitHub Release, with notes pulled from the matching CHANGELOG section.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to create a release for (e.g. v0.8.7)
        required: true
        type: string

permissions:
  # Only the scope needed to create a GitHub Release; no id-token, no npm token.
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Resolve tag and extract changelog notes
        id: notes
        # Tag values reach the shell via env, never interpolated into the script,
        # so a crafted tag name can't inject commands.
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${INPUT_TAG:-$REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          NOTES_FILE="$(mktemp)"
          # Print the lines between `## <tag>` and the next `## ` heading.
          awk -v tag="$TAG" '
            $0 ~ "^## " tag "([ ]|$)" {found=1; next}
            found && /^## / {exit}
            found {print}
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ -s "$NOTES_FILE" ]; then
            echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.notes.outputs.tag }}
          HAS_NOTES: ${{ steps.notes.outputs.has_notes }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          if [ "$HAS_NOTES" = "true" ]; then
            gh release create "$TAG" --title "$TAG" \
              --notes-file "$NOTES_FILE" --verify-tag
          else
            # Fall back to auto-generated notes if the tag isn't in CHANGELOG.md.
            gh release create "$TAG" --title "$TAG" \
              --generate-notes --verify-tag
          fi
