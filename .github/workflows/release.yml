name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  # Required so npm can attach a provenance attestation (--provenance) via OIDC.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Version comes from the root package.json `packageManager` field.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # prepublishOnly runs `pnpm check && pnpm build && pnpm check:publish`, so
      # the release is gated on the same checks as CI plus the publish preflight.
      #
      # Auth uses an npm automation token (NPM_TOKEN secret). Provenance is still
      # attached via OIDC (id-token: write). Tokenless OIDC trusted publishing
      # can replace the token once the pinned pnpm/npm toolchain supports it.
      - name: Publish to npm
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
