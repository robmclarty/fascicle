name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Version comes from the root package.json `packageManager` field, so CI
      # uses the exact pnpm that wrote the lockfile and reads workspace overrides.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check suite
        run: pnpm check
      - name: Build
        run: pnpm build
      # Consumes dist/: publint, attw, the pack manifest, the import smoke test,
      # and the doc snippets typechecked against the built .d.ts.
      - name: Validate publish surface
        run: pnpm check:publish

  mutation:
    # Stryker is the slowest check; run it only on main so PRs stay fast.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Version comes from the root package.json `packageManager` field, so CI
      # uses the exact pnpm that wrote the lockfile and reads workspace overrides.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore Stryker incremental baseline
        # The baseline is gitignored; CI carries it forward across runs so each
        # invocation mutates only what changed since the last green main.
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: stryker.incremental.json
          key: stryker-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            stryker-${{ github.ref_name }}-
            stryker-main-
      - name: Mutation testing
        run: pnpm check:mutation
