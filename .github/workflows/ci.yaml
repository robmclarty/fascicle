name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      # Version comes from the root package.json `packageManager` field, so CI
      # uses the exact pnpm that wrote the lockfile and reads workspace overrides.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check suite
        run: pnpm check
      - name: Build
        run: pnpm build
      - name: Doc snippets vs built types
        run: node scripts/check-doc-snippets.mjs --dist
      - name: Validate publish surface
        run: pnpm check:publish

  mutation:
    # Stryker is the slowest check; run it only on main so PRs stay fast.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      # Version comes from the root package.json `packageManager` field, so CI
      # uses the exact pnpm that wrote the lockfile and reads workspace overrides.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore Stryker incremental baseline
        # The baseline is gitignored; CI carries it forward across runs so each
        # invocation mutates only what changed since the last green main.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: stryker.incremental.json
          key: stryker-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            stryker-${{ github.ref_name }}-
            stryker-main-
      - name: Mutation testing
        run: pnpm check:mutation
