id: no-provider-sdk-outside-providers
message: "Provider SDK packages (@ai-sdk/*, ai-sdk-ollama, @openrouter/ai-sdk-provider) may only be imported from src/engine/providers/. All other engine files talk to models through ProviderAdapter."
severity: error
language: typescript
files:
  - src/engine/**/*.ts
ignores:
  - src/**/test/**
  - src/engine/providers/**/*.ts
rule:
  any:
    - pattern: import $$$ from '$PATH'
    - pattern: import $$$ from "$PATH"
constraints:
  PATH:
    regex: '^(@ai-sdk/|ai-sdk-ollama|@openrouter/ai-sdk-provider)'
