id: no-class
message: Prefer functional/procedural style over classes. Use modules and closures instead. (Exception - typed errors in src/core/errors.ts and src/engine/errors.ts.)
severity: error
language: typescript
files:
  - src/**/*.ts
ignores:
  - src/**/test/**
  - src/core/errors.ts
  - src/engine/errors.ts
rule:
  any:
    - kind: class_declaration
    - kind: abstract_class_declaration
