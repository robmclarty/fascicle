id: no-child-process-outside-claude-cli
message: "node:child_process may only be imported from the claude_cli provider adapter. All other engine code talks to models via the Vercel AI SDK boundary."
severity: error
language: typescript
files:
  - src/engine/**/*.ts
ignores:
  - src/**/__tests__/**
  - src/engine/providers/claude_cli/**/*.ts
rule:
  any:
    - pattern: import $$$ from 'node:child_process'
    - pattern: import $$$ from "node:child_process"
    - pattern: import $$$ from 'child_process'
    - pattern: import $$$ from "child_process"
