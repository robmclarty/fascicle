id: no-process-env-in-core
message: source must not read process.env or process.cwd. Engine code accepts cwd via ClaudeCliProviderConfig.default_cwd; every module receives credentials and paths as function arguments. The claude_cli auth module and the forward_standard_env helper are explicit, audited exceptions — they implement the oauth inherit-env surface users opt into via ClaudeCliProviderConfig.inherit_env.
severity: error
language: typescript
files:
  - src/**/*.ts
ignores:
  - src/**/test/**
  - src/engine/providers/claude_cli/auth.ts
  - src/forward_standard_env.ts
  - src/__tests__/forward_standard_env.test.ts
rule:
  any:
    - pattern: process.env
    - pattern: process.cwd()
