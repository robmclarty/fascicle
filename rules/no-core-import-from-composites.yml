id: no-core-import-from-composites
message: "The core module must not import from composites. Composites depend on core, never the reverse."
severity: error
language: typescript
files:
  - src/core/**/*.ts
ignores:
  - src/**/__tests__/**
rule:
  any:
    - pattern: import $$$ from '$PATH'
    - pattern: import $$$ from "$PATH"
constraints:
  PATH:
    regex: '^#composites$'
