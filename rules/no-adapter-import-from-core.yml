id: no-adapter-import-from-core
message: "The core module must not import adapter modules (observability, stores, engine). Adapters are injected via run_context."
severity: error
language: typescript
files:
  - src/core/**/*.ts
ignores:
  - src/**/test/**
rule:
  any:
    - pattern: import $$$ from '$PATH'
    - pattern: import $$$ from "$PATH"
constraints:
  PATH:
    regex: '^(@repo/(observability|stores|engine|fascicle)(/.*)?|#(observability|stores|engine))$'
