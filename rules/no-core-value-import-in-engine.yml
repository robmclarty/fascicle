id: no-core-value-import-in-engine
message: "The engine module must not import values from core. Only `import type` is permitted (engine talks to core via types; the orchestrator is composed at the application layer). Exception: src/engine/errors.ts re-exports core's aborted_error (see NOTES.md D5)."
severity: error
language: typescript
files:
  - src/engine/**/*.ts
ignores:
  - src/**/__tests__/**
  - src/engine/errors.ts
rule:
  any:
    - pattern: import { $$$ } from '$PATH'
    - pattern: import { $$$ } from "$PATH"
    - pattern: import $NAME from '$PATH'
    - pattern: import $NAME from "$PATH"
    - pattern: import * as $NAME from '$PATH'
    - pattern: import * as $NAME from "$PATH"
constraints:
  PATH:
    regex: '^#core$'
