id: no-engine-import-from-viewer
message: "The viewer module is a dev tool that reads the wire format. It must not import engine, composites, agents, stores, observability, or any provider SDK. Types and trajectory_event_schema come from core only."
severity: error
language: typescript
files:
  - src/viewer/**/*.ts
rule:
  any:
    - pattern: import $$$ from '$PATH'
    - pattern: import $$$ from "$PATH"
constraints:
  PATH:
    regex: '^(#(engine|composites|agents|stores|observability)|@ai-sdk/.*|@openrouter/.*|ai-sdk-ollama|ai|langfuse)$'
