id: no-provider-sdk-in-claude-cli
message: "claude_cli adapter must not import Vercel AI SDK packages (ai, @ai-sdk/*, ai-sdk-ollama, @openrouter/ai-sdk-provider). Subprocess adapters produce GenerateResult directly without going through the AI SDK boundary."
severity: error
language: typescript
files:
  - src/engine/providers/claude_cli/**/*.ts
ignores:
  - src/**/test/**
rule:
  any:
    - pattern: import $$$ from '$PATH'
    - pattern: import $$$ from "$PATH"
constraints:
  PATH:
    regex: '^(ai|@ai-sdk/|ai-sdk-ollama|@openrouter/ai-sdk-provider)($|/)'
