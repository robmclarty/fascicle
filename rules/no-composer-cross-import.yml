id: no-composer-cross-import
message: Composer files must not import other composers. Share through the step<i, o> value contract via types/runner/streaming/cleanup.
severity: error
language: typescript
files:
  - src/core/sequence.ts
  - src/core/parallel.ts
  - src/core/branch.ts
  - src/core/map.ts
  - src/core/pipe.ts
  - src/core/retry.ts
  - src/core/fallback.ts
  - src/core/timeout.ts
  - src/core/adversarial.ts
  - src/core/ensemble.ts
  - src/core/tournament.ts
  - src/core/consensus.ts
  - src/core/checkpoint.ts
  - src/core/suspend.ts
  - src/core/scope.ts
  - src/core/step.ts
rule:
  any:
    - pattern: import $$$ from '$PATH'
    - pattern: import $$$ from "$PATH"
constraints:
  PATH:
    regex: '^\./(sequence|parallel|branch|map|pipe|retry|fallback|timeout|adversarial|ensemble|tournament|consensus|checkpoint|suspend|scope|step)(\.js)?$'
