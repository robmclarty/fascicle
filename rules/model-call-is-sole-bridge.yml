id: model-call-is-sole-bridge
message: "model_call.ts is the only umbrella file allowed to import value symbols from #core and/or #engine. Re-exports (export ... from) are fine; direct value imports must be confined to model_call.ts so the bridge between the composition and engine layers stays in exactly one file. (files is an explicit list of the top-level umbrella files because ast-grep globs treat `*` as crossing `/`; model_call.ts is omitted as the sanctioned bridge.)"
severity: error
language: typescript
files:
  - src/index.ts
  - src/adapters.ts
  - src/forward_standard_env.ts
rule:
  any:
    - pattern: import { $$$ } from '$PATH'
    - pattern: import { $$$ } from "$PATH"
    - pattern: import $NAME from '$PATH'
    - pattern: import $NAME from "$PATH"
    - pattern: import * as $NAME from '$PATH'
    - pattern: import * as $NAME from "$PATH"
constraints:
  PATH:
    regex: '^(@repo/(core|engine)(/.*)?|#(core|engine))$'
